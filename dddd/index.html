<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Looking back</title>
  <style>
    :root {
      --page-bg: #e8f2ff;
      --card-bg: #fffdfa;
      --navy: #1b2f67;
      --navy-soft: #4a5570;
      --divider: #d7dce7;
      --outline: #c9ced9;
      --blue: #2e63b8;
      --shadow: 0 10px 30px rgba(30, 55, 100, 0.07);
      --radius-xl: 34px;
      --radius-lg: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      background: var(--page-bg);
      color: var(--navy);
      font-family: "Segoe UI Variable Display", "Segoe UI Variable Text", "Segoe UI", Arial, sans-serif;
      font-weight: 400;
    }

    .screen {
      width: 768px;
      min-height: 100vh;
      padding: 0 31px 32px;
      background: linear-gradient(180deg, #edf5ff 0%, #e7f1ff 100%);
    }

    .summary-card,
    .followup-card {
      width: 100%;
      background: var(--card-bg);
      box-shadow: var(--shadow);
    }

    .summary-card {
      margin-top: 0;
      border-bottom-left-radius: var(--radius-xl);
      border-bottom-right-radius: var(--radius-xl);
      padding: 34px 31px 30px;
    }

    .title {
      margin: 0;
      font-size: 30px;
      line-height: 1.12;
      font-weight: 620;
      text-align: center;
      letter-spacing: -0.03em;
    }

    .dates {
      margin: 12px 0 43px;
      text-align: center;
      font-size: 25px;
      line-height: 1.2;
      font-weight: 350;
      color: var(--navy-soft);
      letter-spacing: -0.02em;
    }

    .metric-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 22px;
    }

    .metric-label {
      font-size: 28px;
      line-height: 1.22;
      font-weight: 350;
      letter-spacing: -0.025em;
      color: var(--navy);
    }

    .metric-value-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .metric-value {
      font-size: 35px;
      line-height: 1;
      font-weight: 620;
      letter-spacing: -0.045em;
      color: var(--navy);
    }

    .metric-divider {
      margin: 31px 22px 39px;
      border-top: 3px dashed var(--divider);
    }

    .feedback-box {
      position: relative;
      margin: 56px 0 2px;
      border: 2px solid #c2c7d3;
      border-radius: 26px;
      padding: 29px 28px 30px;
    }

    .feedback-title {
      margin: 0;
      text-align: center;
      font-size: 30px;
      line-height: 1.16;
      font-weight: 350;
      letter-spacing: -0.03em;
      color: var(--navy);
    }

    .close-button {
      position: absolute;
      top: 29px;
      right: 29px;
      width: 30px;
      height: 30px;
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--navy);
      cursor: default;
    }

    .feedback-actions {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      align-items: center;
      margin-top: 36px;
      min-height: 154px;
    }

    .feedback-divider {
      width: 1px;
      height: 104px;
      background: var(--outline);
      justify-self: center;
    }

    .action {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--blue);
    }

    .action span {
      font-size: 24px;
      line-height: 1;
      font-weight: 350;
      color: var(--navy);
      letter-spacing: -0.025em;
    }

    .followup-card {
      margin-top: 20px;
      border-top-left-radius: 30px;
      border-top-right-radius: 30px;
      padding: 32px 31px 40px;
    }

    .followup-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      text-align: center;
      font-weight: 650;
      letter-spacing: -0.03em;
      color: var(--navy);
    }

    .icon {
      display: block;
    }

    .icon-info {
      width: 38px;
      height: 38px;
    }

    .icon-thumb {
      width: 60px;
      height: 60px;
      overflow: visible;
    }

    .icon-close {
      width: 30px;
      height: 30px;
    }

    @media (max-width: 800px) {
      .screen {
        width: 100%;
      }
    }

    @media (max-width: 680px) {
      .screen {
        padding: 0 16px 24px;
      }

      .summary-card {
        padding: 28px 18px 24px;
      }

      .title,
      .followup-title,
      .feedback-title {
        font-size: 24px;
      }

      .dates {
        font-size: 22px;
        margin-bottom: 32px;
      }

      .metric-row {
        padding: 0 6px;
      }

      .metric-label {
        font-size: 24px;
      }

      .metric-value {
        font-size: 30px;
      }

      .metric-value-wrap {
        gap: 12px;
      }

      .feedback-box {
        padding: 26px 18px 24px;
      }

      .feedback-actions {
        margin-top: 28px;
      }

      .action span {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="screen">
    <section class="summary-card">
      <h1 class="title">Looking back</h1>
      <p class="dates">07 Mar - 05 Apr</p>

      <div class="metric-row">
        <div class="metric-label">Average daily spend</div>
        <div class="metric-value-wrap">
          <div class="metric-value">£2,127.55</div>
          <svg class="icon icon-info" viewBox="0 0 40 40" aria-hidden="true">
            <circle cx="20" cy="20" r="17.5" fill="#2e63b8"></circle>
            <rect x="18.55" y="16" width="2.9" height="11.4" rx="1.45" fill="#ffffff"></rect>
            <circle cx="20" cy="11.55" r="2.1" fill="#ffffff"></circle>
          </svg>
        </div>
      </div>

      <div class="metric-divider"></div>

      <div class="metric-row">
        <div class="metric-label">Average weekly spend</div>
        <div class="metric-value-wrap">
          <div class="metric-value">£14,892.83</div>
          <svg class="icon icon-info" viewBox="0 0 40 40" aria-hidden="true">
            <circle cx="20" cy="20" r="17.5" fill="#2e63b8"></circle>
            <rect x="18.55" y="16" width="2.9" height="11.4" rx="1.45" fill="#ffffff"></rect>
            <circle cx="20" cy="11.55" r="2.1" fill="#ffffff"></circle>
          </svg>
        </div>
      </div>

      <section class="feedback-box" aria-label="Feedback">
        <h2 class="feedback-title">Did you find this summary useful?</h2>
        <button class="close-button" type="button" aria-label="Close">
          <svg class="icon icon-close" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M7 7L25 25" stroke="#1b2f67" stroke-width="2.4" stroke-linecap="round"></path>
            <path d="M25 7L7 25" stroke="#1b2f67" stroke-width="2.4" stroke-linecap="round"></path>
          </svg>
        </button>

        <div class="feedback-actions">
          <div class="action">
            <svg class="icon icon-thumb" viewBox="0 0 64 64" aria-hidden="true">
              <g fill="none" stroke="#2e63b8" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23.5 28.5H15.8C13.2 28.5 11 30.7 11 33.3V45.7C11 48.3 13.2 50.5 15.8 50.5H23.5V28.5Z"></path>
                <path d="M27.5 50.5H45.7C48.1 50.5 50.3 48.8 50.8 46.4L54.1 32.2C54.8 29.2 52.6 26.3 49.5 26.3H39.1L40.9 17C41.4 14.3 39.3 11.9 36.7 11.9C34.8 11.9 33 13 32.2 14.8L26.7 28.4C26.2 29.7 26 30.4 26 31.7V49C26 49.8 26.7 50.5 27.5 50.5Z"></path>
              </g>
            </svg>
            <span>Yes</span>
          </div>

          <div class="feedback-divider"></div>

          <div class="action">
            <svg class="icon icon-thumb" viewBox="0 0 64 64" aria-hidden="true">
              <g transform="translate(64 64) rotate(180)">
                <g fill="none" stroke="#2e63b8" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M23.5 28.5H15.8C13.2 28.5 11 30.7 11 33.3V45.7C11 48.3 13.2 50.5 15.8 50.5H23.5V28.5Z"></path>
                  <path d="M27.5 50.5H45.7C48.1 50.5 50.3 48.8 50.8 46.4L54.1 32.2C54.8 29.2 52.6 26.3 49.5 26.3H39.1L40.9 17C41.4 14.3 39.3 11.9 36.7 11.9C34.8 11.9 33 13 32.2 14.8L26.7 28.4C26.2 29.7 26 30.4 26 31.7V49C26 49.8 26.7 50.5 27.5 50.5Z"></path>
                </g>
              </g>
            </svg>
            <span>No</span>
          </div>
        </div>
      </section>
    </section>

    <section class="followup-card">
      <h2 class="followup-title">We’d love to hear</h2>
    </section>
  </main>
</body>
</html>
